<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Files_Погода+</title>
  <meta name="theme-color" content="#0080ff" />
  <link rel="manifest" href="manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: sans-serif;
      padding: 1em;
      max-width: 100%;
    }
    #plainText {
      font-family: sans-serif;
      font-size: 16px;
    }
    textarea {
      width: 100%;
      height: 140px;
    }
    input, button {
      margin: 0.5em 0;
      font-size: 1.2em;
    }
    button {
      font-size: 1em;
      padding: 0.5em 0.5em;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #f0f0f0;
      border-radius: 4px;
      transition: all 0.2s ease;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1em;
      gap: 10px;
    }
    .top-bar h1 {
      margin: 0;
      font-size: 1.8em;
      white-space: nowrap;
    }
    /* Стилі для контейнера пароля та ока */
    #password-container {
      position: relative;
      display: none; /* Керується через JS за 7 кліками */
      align-items: center;
      width: 100%;
      max-width: 250px;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding-right: 40px;
      box-sizing: border-box;
      background: #fff;
    }
    #password {
      border: none;
      outline: none;
      background: transparent;
      color: #000;
      caret-color: #000;
      font-size: 24px;
      height: 50px;
      width: 100%;
      padding: 0 10px;
      box-sizing: border-box;
    }
    .toggle-password {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 5px;
      margin: 0;
    }
    #mode-container {
      display: flex;
      justify-content: center;
      gap: 1em;
      font-size: 1em;
      margin-bottom: 1em;
    }
    #buttons-container {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.3em;
      overflow-x: auto;
    }
    #buttons-container button {
      flex: 1 1 auto;
      min-width: 80px;
      font-size: 0.9em;
      text-align: center;
      line-height: 1.2;
    }
    /* Стилі для підсвічування кнопок дії */
    button.btn-primary {
      background-color: #0080ff;
      color: white;
      border-color: #0066cc;
      font-weight: bold;
      transform: scale(1.02);
    }
    button.btn-secondary {
      opacity: 0.5;
      background-color: #f9f9f9;
      color: #555;
    }
    .small {
      font-size: 0.9em;
      color: gray;
      margin-top: 0.3em;
    }
    #copyMsg button {
      font-size: 0.9em;
      padding: 0.3em 0.6em;
      margin-left: 0.5em;
      cursor: pointer;
    }
    .sin-informer {
      border: none !important;
    }
    .sin-informer__marker {
      font-size: 17px !important;
    }
    .sin-informer__header {
      font-size: 17px !important;
    }
    #result {
      color: #333;
      margin-top: 0.3em;
      word-break: break-all;
      font-family: sans-serif;
      font-size: 16px;
    }
    #upload-container {
      display: none;
      gap: 0.5em;
      margin-bottom: 0.5em;
    }
    #upload-container button {
      font-size: 0.9em;
      cursor: pointer;
    }
    #mode-container,
    #buttons-container,
    #plainText,
    #result,
    #copyMsg,
    #bruteForceTime,
    #superSecureContainer {
      display: none;
    }
  </style>
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('✅ Service Worker зареєстрований', reg.scope))
        .catch(err => console.error('❌ Помилка реєстрації Service Worker:', err));
    }
  </script>
  <div class="top-bar">
    <h1 id="mainTitle">🌤️ Погода+</h1>
    <div id="password-container">
      <input type="password" id="password" autocomplete="off" />
      <button type="button" class="toggle-password" id="togglePasswordBtn" title="Показати/приховати пароль">👁️</button>
    </div>
  </div>

  <div id="mode-container">
    <label><input type="radio" name="mode" value="dynamic" checked /> Динамічний</label>
    <label><input type="radio" name="mode" value="static" /> Статичний</label>
  </div>

  <link rel="stylesheet" href="https://sinoptik.ua/resources/informer/css/informer.css" />
  <div class="sin-informer sin-informer_font-Arial sin-informer_theme-light" style="width:300px;" data-lang="uk">
    <div class="sin-informer__header">
      <p class="sin-informer__date">Погода на найближчий час</p>
      <p class="sin-informer__time" data-format="24">
        <span class="sin-informer__time-icon"></span>
      </p>
    </div>
    <div class="sin-informer__main sin-informer__main_inline">
      <div class="sin-informer__entry">
        <p class="sin-informer__location">Шевченкове</p>
        <div class="sin-informer__primary" id="title">
          <p class="sin-informer__local-time"></p>
          <p class="sin-informer__temp" data-unit="c"></p>
          <div class="sin-informer__condition" data-icon-path="https://sinoptik.ua/resources/informer/assets/icons/conditions"></div>
        </div>
        <div class="sin-informer__secondary" style="display: none">
          <p class="sin-informer__marker sin-informer__marker_wind" data-unit="ms" data-suffix="м/с" data-directions="Західний,Північно-Західний,Північний,Північно-Східний,Східний,Південно-Східний,Південний,Південно-Західний,Штиль" title="Вітер">
            <span class="sin-informer__marker-icon"></span>
          </p>
          <p class="sin-informer__marker sin-informer__marker_humidity" title="Волога">
            <span class="sin-informer__marker-icon"></span>
          </p>
          <p class="sin-informer__marker sin-informer__marker_precipitation" title="Ймовірність опадів">
            <span class="sin-informer__marker-icon"></span>
          </p>
        </div>
      </div>
    </div>
  </div>
  <script defer src="https://sinoptik.ua/api/informer/content?loc=PSgEPUVv2QbrbSiU2wFUPwAv&cem=gnNRgn5ogrNx2s3vbhD7cM=0cTYUcnHRPUfSPSb6PS3vBkC"></script>

  <textarea id="plainText" autocomplete="off" placeholder="Введіть text для шифрування або вставте зашифрований код..."></textarea>

  <div id="upload-container">
    <button id="fileLabelBtn">📄 Вибрати файл</button>
    <button id="folderLabelBtn">📁 Вибрати папку</button>
  </div>
  
  <input type="file" id="fileInput" style="display:none" />
  <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none" />
        
  <div id="superSecureContainer" style="display: none; text-align: left; margin-bottom: 1em;">
    <label><input type="checkbox" id="superSecure" /> 💪 Супер шифрування</label>
  </div>

  <div id="buttons-container">
    <button id="encryptBtn" onclick="encrypt()">🔒Зашифрувати</button>
    <button id="decryptBtn" onclick="decrypt()">🔓Розшифрувати</button>
    <button id="clearBtn" onclick="clearFields()">🧹Очистити</button>
  </div>

  <div id="result"></div>
  <div id="copyMsg" class="small"></div>
  <div id="bruteForceTime" class="small" style="margin-top: 0.3em; color: #333;"></div>

  <script src="js/argon2-bundled.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script>
    let clickCount = 0;
    const requiredClicks = 7;
    
    let selectedFiles = [];       
    let processedName = "";       
    let isFolderMode = false;     
    let isSingleEncFile = false;  

    const encryptBtn = document.getElementById("encryptBtn");
    const decryptBtn = document.getElementById("decryptBtn");
    const plainTextEl = document.getElementById("plainText");
    const passwordInput = document.getElementById("password");
    const togglePasswordBtn = document.getElementById("togglePasswordBtn");
    const passwordContainer = document.getElementById("password-container");

    // Фокус на інпуті при кліку по контейнеру пароля
    passwordContainer.addEventListener("click", (e) => {
      if (e.target !== togglePasswordBtn) {
        passwordInput.focus();
      }
    });

    document.getElementById("title").addEventListener("click", () => {
      clickCount++;
      if (clickCount >= requiredClicks) {
        passwordContainer.style.display = "flex";
        document.getElementById("mode-container").style.display = "flex";
        document.getElementById("buttons-container").style.display = "flex";
        plainTextEl.style.display = "block";
        document.getElementById("result").style.display = "block";
        document.getElementById("copyMsg").style.display = "block";
        document.getElementById("bruteForceTime").style.display = "block";
        document.getElementById("upload-container").style.display = "flex"; 
        document.getElementById("superSecureContainer").style.display = "block";
        updateSmartButtons();
      }
    });

    // Логіка роботи ока показу пароля
    togglePasswordBtn.addEventListener("click", (e) => {
      e.stopPropagation(); // щоб не спрацьовував фокус контейнера
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        togglePasswordBtn.textContent = "🙈";
      } else {
        passwordInput.type = "password";
        togglePasswordBtn.textContent = "👁️";
      }
    });

    // Автоматичне підсвічування потрібної кнопки
    function updateSmartButtons() {
      const textVal = plainTextEl.value.trim();
      // Перевірка чи схожий текст на Base64 рядок шифру
      const isBase64Text = textVal.length > 40 && /^[A-Za-z0-9+/=\s]+$/.test(textVal);

      if (isSingleEncFile || isBase64Text) {
        decryptBtn.className = "btn-primary";
        encryptBtn.className = "btn-secondary";
      } else if (selectedFiles.length > 0 || textVal.length > 0) {
        encryptBtn.className = "btn-primary";
        decryptBtn.className = "btn-secondary";
      } else {
        encryptBtn.className = "";
        decryptBtn.className = "";
      }
    }

    plainTextEl.addEventListener("input", updateSmartButtons);

    const fileInput = document.getElementById("fileInput");
    const folderInput = document.getElementById("folderInput");
    const fileLabelBtn = document.getElementById("fileLabelBtn");
    const folderLabelBtn = document.getElementById("folderLabelBtn");

    fileLabelBtn.addEventListener("click", () => {
      fileInput.click();
    });

    folderLabelBtn.addEventListener("click", () => {
      folderInput.click();
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) {
        folderInput.value = ""; 
        isFolderMode = false;
        
        const file = fileInput.files[0];
        selectedFiles = [file];
        processedName = file.name;
        isSingleEncFile = file.name.endsWith(".enc");

        if (isSingleEncFile) {
          document.getElementById("copyMsg").textContent = `Обрано зашифрований файл: ${processedName}`;
        } else {
          document.getElementById("copyMsg").textContent = `Обрано звичайний файл: ${processedName}`;
        }

        plainTextEl.style.display = "none";
        plainTextEl.value = "";
        document.getElementById("result").textContent = "";
        updateSmartButtons();
      } else {
        checkEmptyInputs();
      }
    });

    folderInput.addEventListener("change", () => {
      if (folderInput.files.length > 0) {
        fileInput.value = ""; 
        isFolderMode = true;
        isSingleEncFile = false;
        
        selectedFiles = Array.from(folderInput.files);
        const relativePath = selectedFiles[0].webkitRelativePath;
        processedName = relativePath ? relativePath.split('/')[0] : "папка";

        document.getElementById("copyMsg").textContent = `Обрано папку: "${processedName}" (${selectedFiles.length} файлів)`;
        
        plainTextEl.style.display = "none";
        plainTextEl.value = "";
        document.getElementById("result").textContent = "";
        updateSmartButtons();
      } else {
        checkEmptyInputs();
      }
    });

    function checkEmptyInputs() {
      if (fileInput.files.length === 0 && folderInput.files.length === 0) {
        clearFields();
      }
    }

    function getDayOfYear(date = new Date()) {
      const start = new Date(date.getFullYear(), 0, 0);
      const diff = date - start;
      const oneDay = 1000 * 60 * 60 * 24;
      return Math.floor(diff / oneDay);
    }

    async function computeTail(password, dayOfYear) {
      const enc = new TextEncoder();
      const msg = password + dayOfYear.toString();
      const hashBuffer = await crypto.subtle.digest("SHA-256", enc.encode(msg));
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("").slice(0, 32);
    }

    async function getKey(password, salt) {
      const superSecure = document.getElementById("superSecure")?.checked;
      const timeCost = superSecure ? 100 : 10;
      const memCost = superSecure ? 256 * 1024 : 40 * 1024;
      const parallelismCost = superSecure ? 4 : 1;
      const argon2Hash = await argon2.hash({
        pass: password,
        salt: salt,
        time: timeCost,
        mem: memCost,
        parallelism: parallelismCost,
        hashLen: 32,
        type: argon2.Argon2id
      });
      return await crypto.subtle.importKey(
        "raw",
        argon2Hash.hash,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.opacity = 0;
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      try {
        document.execCommand("copy");
      } catch {}
      document.body.removeChild(textarea);
    }

    function showCopyButton(text, duration) {
      const copyMsg = document.getElementById("copyMsg");
      copyMsg.innerHTML = `⏱️ ${duration} сек <button onclick="fallbackCopy('${text.replace(/'/g, "\\'")}')">Скопіювати</button>`;
    }

    function showCopiedMessage(duration) {
      const copyMsg = document.getElementById("copyMsg");
      copyMsg.textContent = `⏱️ ${duration} сек - Скопійовано`;
    }

    async function copyText(text, duration) {
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        showCopiedMessage(duration);
      } catch {
        showCopyButton(text, duration);
      }
    }

    async function encrypt() {
      const startTime = performance.now();
      const passwordInputVal = passwordInput.value;
      if (!passwordInputVal) return alert("Введіть пароль!");

      if (selectedFiles.length > 0) {
        if (isSingleEncFile) return alert("Цей файл вже має розширення .enc! Виберіть початковий файл або папку.");
        
        try {
          let dataBuffer;
          
          if (isFolderMode) {
            document.getElementById("copyMsg").textContent = "🗜️ Пакування папки в архів...";
            const zip = new JSZip();
            for (const file of selectedFiles) {
              zip.file(file.webkitRelativePath, file);
            }
            dataBuffer = await zip.generateAsync({ type: "arraybuffer" });
          } else {
            document.getElementById("copyMsg").textContent = "📄 Читання файлу...";
            dataBuffer = await selectedFiles[0].arrayBuffer();
          }
          
          document.getElementById("copyMsg").textContent = "🔒 Шифрування даних...";

          const mode = document.querySelector('input[name="mode"]:checked').value;
          let realPassword = passwordInputVal;
          if (mode === "dynamic") {
            const currentDate = new Date();
            const dayOfYear = getDayOfYear(currentDate);
            realPassword += await computeTail(passwordInputVal, dayOfYear);
          }
          
          const salt = crypto.getRandomValues(new Uint8Array(16));
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const key = await getKey(realPassword, salt);
          
          const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, dataBuffer);
          const full = new Uint8Array(salt.byteLength + iv.byteLength + encrypted.byteLength);
          full.set(salt);
          full.set(iv, 16);
          full.set(new Uint8Array(encrypted), 28);

          const extension = isFolderMode ? ".folder.enc" : ".enc";
          saveFile(full.buffer, processedName + extension);
          
          const duration = ((performance.now() - startTime) / 1000).toFixed(3);
          document.getElementById("copyMsg").textContent = `Зашифровано за ${duration} сек. Об'єкт збережено.`;
        } catch (e) {
          console.error(e);
          alert("Помилка шифрування: " + e.message);
        }
      } else {
        const enc = new TextEncoder();
        const plainText = plainTextEl.value;
        if (!plainText) return alert("Введіть текст або виберіть файл/папку!");

        try {
          const mode = document.querySelector('input[name="mode"]:checked').value;
          let realPassword = passwordInputVal;
          if (mode === "dynamic") {
            const currentDate = new Date();
            const dayOfYear = getDayOfYear(currentDate);
            realPassword += await computeTail(passwordInputVal, dayOfYear);
          }
          const salt = crypto.getRandomValues(new Uint8Array(16));
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const key = await getKey(realPassword, salt);
          const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(plainText));
          const full = new Uint8Array(salt.byteLength + iv.byteLength + encrypted.byteLength);
          full.set(salt);
          full.set(iv, 16);
          full.set(new Uint8Array(encrypted), 28);
          const base64 = btoa(String.fromCharCode(...full));
          document.getElementById("result").textContent = base64;
          const duration = ((performance.now() - startTime) / 1000).toFixed(3);
          await copyText(base64, duration);
          updateSmartButtons();
        } catch (e) {
          document.getElementById("result").textContent = "❌ Помилка шифрування тексту.";
        }
      }
    }

    async function decrypt() {
      const startTime = performance.now();
      const passwordInputVal = passwordInput.value;
      if (!passwordInputVal) return alert("Введіть пароль!");

      if (selectedFiles.length > 0) {
        if (isFolderMode) return alert("Для розшифрування потрібно вибрати один файл .enc, а не папку!");
        if (!isSingleEncFile) return alert("Вибраний файл не має розширення .enc!");

        try {
          document.getElementById("copyMsg").textContent = "🔓 Дешифрування...";
          const arrayBuffer = await selectedFiles[0].arrayBuffer();
          const full = new Uint8Array(arrayBuffer);
          if (full.length < 28) throw new Error("Файл пошкоджений або занадто малий.");

          const salt = full.slice(0, 16);
          const iv = full.slice(16, 28);
          const data = full.slice(28);

          const mode = document.querySelector('input[name="mode"]:checked').value;
          let realPassword = passwordInputVal;
          if (mode === "dynamic") {
            const currentDate = new Date();
            const dayOfYear = getDayOfYear(currentDate);
            realPassword += await computeTail(passwordInputVal, dayOfYear);
          }
          const key = await getKey(realPassword, salt);
          const decryptedBuffer = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);

          if (processedName.endsWith(".folder.enc")) {
            document.getElementById("copyMsg").textContent = "📦 Формування архіву папки...";
            let originalName = processedName.slice(0, -11); 
            if(!originalName) originalName = "розшифрована_папка";
            
            saveFile(decryptedBuffer, originalName + ".zip");
            const duration = ((performance.now() - startTime) / 1000).toFixed(3);
            document.getElementById("copyMsg").textContent = `Папку розшифровано за ${duration} сек. Збережено як ZIP-архів.`;
          } else {
            let originalName = processedName.slice(0, -4); 
            saveFile(decryptedBuffer, originalName);
            const duration = ((performance.now() - startTime) / 1000).toFixed(3);
            document.getElementById("copyMsg").textContent = `Файл розшифровано за ${duration} сек. Збережено як ${originalName}`;
          }
          document.getElementById("result").textContent = "";
        } catch (e) {
          console.error(e);
          alert("Помилка дешифрування. Перевірте пароль/режим або структуру файлу.");
        }
      } else {
        const base64 = plainTextEl.value.trim();
        if (!base64) return alert("Введіть текст для розшифрування!");

        try {
          const dec = new TextDecoder();
          const mode = document.querySelector('input[name="mode"]:checked').value;
          let realPassword = passwordInputVal;
          if (mode === "dynamic") {
            const currentDate = new Date();
            const dayOfYear = getDayOfYear(currentDate);
            realPassword += await computeTail(passwordInputVal, dayOfYear);
          }
          const full = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
          const salt = full.slice(0, 16);
          const iv = full.slice(16, 28);
          const data = full.slice(28);
          const key = await getKey(realPassword, salt);
          const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
          document.getElementById("result").textContent = dec.decode(decrypted);
          const duration = ((performance.now() - startTime) / 1000).toFixed(3);
          await copyText(dec.decode(decrypted), duration);
        } catch (e) {
          document.getElementById("result").textContent = "❌ Помилка дешифрування тексту.";
        }
      }
    }

    function saveFile(buffer, filename) {
      const blob = new Blob([buffer]);
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 0);
    }

    function clearFields() {
      selectedFiles = [];
      processedName = "";
      isFolderMode = false;
      isSingleEncFile = false;
      fileInput.value = "";
      folderInput.value = "";
      plainTextEl.value = "";
      plainTextEl.style.display = "block"; 
      document.getElementById("result").textContent = "";
      document.getElementById("copyMsg").textContent = "";
      updateSmartButtons();
    }

    function estimateCharsetSize(password) {
      let charsetSize = 0;
      const hasLatinUpper = /[A-Z]/.test(password);
      const hasLatinLower = /[a-z]/.test(password);
      const hasCyrillic = /[А-Яа-яЁёЇїІіЄєҐґ]/.test(password);
      const hasDigits = /\d/.test(password);
      const hasSpecial = /[^A-Za-zА-Яа-яЁёЇїІіЄєҐґ\d]/.test(password);

      if (hasLatinUpper) charsetSize += 26;
      if (hasLatinLower) charsetSize += 26;
      if (hasCyrillic) charsetSize += 66;
      if (hasDigits) charsetSize += 10;
      if (hasSpecial) charsetSize += 32;
      return charsetSize;
    }

    function formatDuration(seconds) {
      if (seconds < 60) return seconds.toFixed(2) + " сек";
      const minutes = seconds / 60;
      if (minutes < 60) return minutes.toFixed(2) + " хв";
      const hours = minutes / 60;
      if (hours < 24) return hours.toFixed(2) + " год";
      const days = hours / 24;
      if (days < 365) return days.toFixed(2) + " дн";
      const years = days / 365;
      if (years < 1000000) return Math.floor(years).toLocaleString("uk") + " р";
      return `~10^${Math.floor(Math.log10(seconds))} сек`;
    }

    function estimateBruteForceTime(password) {
      const charsetSize = estimateCharsetSize(password);
      const length = password.length;
      const mode = document.querySelector('input[name="mode"]:checked').value;
      const superSecure = document.getElementById("superSecure")?.checked;

      if (charsetSize === 0) return "Немає символів для аналізу";

      try {
        let combinations = BigInt(charsetSize) ** BigInt(length);
        if (mode === "dynamic") {
          combinations *= BigInt(365);
        }
        const attemptsPerSec = superSecure ? BigInt(80000) : BigInt(800000);

        if (combinations < attemptsPerSec) return "< 1 сек";

        const secondsBigInt = combinations / attemptsPerSec;
        const maxSafe = BigInt(Number.MAX_SAFE_INTEGER);

        if (secondsBigInt <= maxSafe) {
          const seconds = Number(secondsBigInt);
          return formatDuration(seconds);
        } else {
          return `~10^${secondsBigInt.toString().length - 1} сек`;
        }
      } catch {
        return "Занадто великий пароль для оцінки";
      }
    }

    function updateBruteForceTime() {
      const passwordVal = passwordInput.value;
      const bfTimeEl = document.getElementById("bruteForceTime");
      if (!passwordVal) {
        bfTimeEl.textContent = "";
        return;
      }
      bfTimeEl.textContent = "⏳ Оцінка часу перебору: " + estimateBruteForceTime(passwordVal);
    }

    passwordInput.addEventListener("input", () => {
      updateBruteForceTime();
      updateSmartButtons();
    });
    document.querySelectorAll('input[name="mode"]').forEach(radio => {
      radio.addEventListener("change", updateBruteForceTime);
    });
    document.getElementById("superSecure").addEventListener("change", updateBruteForceTime);
    updateBruteForceTime();
  </script>
</body>
